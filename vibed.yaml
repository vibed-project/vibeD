#   apiKeys:
#     - key: "env:VIBED_API_KEY"  # Read from env var
#       name: "default"
#     - key: "vibed_sk_your_secret_key_here"
#       name: "ci-pipeline"
#       scopes: ["deploy"]
#     # Per-user storage: each user gets their own repo
#     # - key: "env:ALICE_KEY"
#     #   name: "alice"
