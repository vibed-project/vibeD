# -- Number of vibeD replicas. Set >= 2 for high availability in production.
replicaCount: 1

image:
  repository: vibed
  # -- Image tag. IMPORTANT: Always pin to a specific version in production
  # (e.g. "0.1.0"). Using "latest" risks deploying untested code.
  tag: "latest"
  # -- Pull policy. Use "Always" in production to ensure the pinned tag
  # is re-fetched if the registry image was updated.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  # -- NodePort number when service.type is NodePort (used by dev setup).
  nodePort: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: vibed.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: vibed-tls
    #   hosts:
    #     - vibed.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Pod-level security context. Applies to all containers in the pod.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534       # nobody
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context for the vibed container.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""

config:
  server:
    transport: "http"
    httpAddr: ":8080"
  deployment:
    preferredTarget: "auto"
    namespace: "default"
  builder:
    engine: "buildah"
    image: "paketobuildpacks/builder-jammy-base:latest"
    pullPolicy: "if-not-present"
    containerRuntime: "auto"
    buildah:
      image: "quay.io/buildah/stable:latest"
      timeout: "10m"
      insecure: true  # kind-registry is HTTP-only
  storage:
    backend: "local"
    local:
      basePath: "/data/vibed/artifacts"
  registry:
    enabled: true
    url: "kind-registry:5000"
    insecure: true  # kind-registry is HTTP-only
  store:
    backend: "configmap"
    configmap:
      name: "vibed-artifacts"
      namespace: ""  # Defaults to release namespace
  knative:
    domainSuffix: "127.0.0.1.sslip.io"
    ingressClass: "kourier.ingress.networking.knative.dev"
    # -- External gateway port for Knative URLs. Set to 0 or 80 to omit from URLs.
    # In Kind dev setup, NodePort 31080 maps to host port 80, so use 80 (default HTTP).
    gatewayPort: 80
  # -- Resource limits for MCP tool inputs.
  limits:
    # -- Max total file content size in bytes (default: 50 MB).
    maxTotalFileSize: 52428800
    # -- Max number of files per deploy/update request (default: 500).
    maxFileCount: 500
    # -- Max log lines per request (default: 10000).
    maxLogLines: 10000

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

metrics:
  enabled: true
  # -- ServiceMonitor for Prometheus Operator. Requires the Prometheus Operator
  # CRDs to be installed in the cluster. Alternative to annotation-based scraping.
  serviceMonitor:
    enabled: false
    interval: 30s
    # -- Extra labels for ServiceMonitor selector matching
    labels: {}
  # -- PrometheusRule for alerting. Requires the Prometheus Operator CRDs.
  prometheusRule:
    enabled: false
    # -- Extra labels for PrometheusRule selector matching
    labels: {}

# -- Authentication for MCP and API endpoints.
# IMPORTANT: Enable auth before exposing vibeD outside the cluster.
auth:
  # -- Set to true to require API key authentication.
  enabled: false
  mode: "apikey"              # "apikey" or "oauth"
  existingSecret: ""          # Use existing K8s Secret for API key (key: "api-key")
  tls:
    enabled: false
    existingSecret: ""        # Use existing K8s Secret for TLS certs (tls.crt, tls.key)
