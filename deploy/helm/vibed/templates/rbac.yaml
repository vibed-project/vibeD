apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vibed.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibed.labels" . | nindent 4 }}
rules:
  # --- Read-only: pod inspection and log retrieval ---
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # --- Secrets: for validating secret references during deploy ---
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

  # --- Services: vibeD creates/manages K8s Services for deployed artifacts ---
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # --- ConfigMaps: artifact store + static file deployments ---
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # --- Deployments: plain Kubernetes deployment target ---
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # --- Build Jobs: Buildah container image builds ---
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # --- Knative Serving: serverless deployment target ---
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vibed.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibed.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vibed.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vibed.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vibed.fullname" . }}-crd-reader
  labels:
    {{- include "vibed.labels" . | nindent 4 }}
rules:
  # --- CRD detection: auto-detect available deployment targets ---
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vibed.fullname" . }}-crd-reader
  labels:
    {{- include "vibed.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vibed.fullname" . }}-crd-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "vibed.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
